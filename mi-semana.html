<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Plan Real</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;
  --s1:#111;--s2:#181818;--s3:#1f1f1f;
  --box:#ff3d00;--box2:#ff6d3a;
  --gym:#00e5ff;--class:#ffd600;
  --food:#4ade80;--sleep:#a78bfa;--prep:#f472b6;
  --text:#f5f5f5;--muted:#555;--muted2:#888;
  --border:rgba(255,255,255,0.07);
  --nav:68px;--safe:env(safe-area-inset-bottom,0px);
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;
  padding-bottom:calc(var(--nav) + var(--safe) + 8px);
  overflow-x:hidden;
}
.screen{max-width:480px;margin:0 auto;}
.nav{max-width:480px;left:50%;transform:translateX(-50%);right:auto;}

/* ── AMBIENT BG ── */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ambient-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.06;}
.ab1{width:400px;height:400px;background:var(--box);top:-100px;left:-100px;}
.ab2{width:300px;height:300px;background:var(--gym);bottom:-80px;right:-60px;}
.ab3{width:200px;height:200px;background:var(--sleep);top:40%;left:60%;}

/* ── SCREENS ── */
.screen{position:relative;z-index:1;display:none;min-height:100dvh;}
.screen.active{display:block;animation:fadeUp 0.25s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── BOTTOM NAV ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--nav) + var(--safe));
  padding-bottom:var(--safe);
  background:rgba(10,10,10,0.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;border:none;background:none;cursor:pointer;
  color:var(--muted);transition:color 0.15s;padding:8px 0;
}
.nav-btn.active{color:var(--box);}
.nav-icon{font-size:22px;line-height:1;transition:transform 0.15s;}
.nav-btn.active .nav-icon{transform:scale(1.15);}
.nav-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.nav-pip{width:4px;height:4px;border-radius:50%;background:var(--box);margin-top:1px;opacity:0;transition:opacity 0.2s;}
.nav-btn.active .nav-pip{opacity:1;}

/* ════════════════════════════════
   HOY SCREEN
════════════════════════════════ */
.hoy-top{padding:56px 20px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.hoy-greeting{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:4px;}
.hoy-day{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,14vw,5rem);line-height:0.9;letter-spacing:1px;}
.hoy-day em{color:var(--box);font-style:normal;}
.hoy-sub{font-size:12px;color:var(--muted2);margin-top:8px;font-weight:400;}

/* Progress ring */
.ring-wrap{flex-shrink:0;position:relative;width:76px;height:76px;margin-top:4px;}
.ring-wrap svg{width:76px;height:76px;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:6;}
.ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:207;stroke-dashoffset:207;
  transition:stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-size:18px;font-weight:800;line-height:1;color:var(--text);}
.ring-lbl{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);margin-top:2px;}

/* Hoy progress bar strip */
.hoy-strip{margin:0 20px 20px;background:var(--s2);border-radius:12px;padding:14px 16px;
  border:1px solid var(--border);}
.hoy-strip-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hoy-strip-label{font-size:12px;font-weight:600;color:var(--muted2);}
.hoy-strip-count{font-size:12px;font-weight:700;color:var(--text);}
.strip-track{height:6px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;}
.strip-fill{height:100%;background:linear-gradient(90deg,var(--box),var(--box2));border-radius:6px;transition:width 0.5s ease;}

/* Section label */
.sec-label{padding:0 20px 10px;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}

/* Hoy tasks */
.task-list{padding:0 16px;display:flex;flex-direction:column;gap:6px;margin-bottom:28px;}
.task-item{
  display:flex;align-items:center;gap:14px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  cursor:pointer;transition:all 0.15s;user-select:none;
  -webkit-user-select:none;
}
.task-item:active{transform:scale(0.98);background:var(--s3);}
.task-item.done{opacity:0.35;}
.task-item.done .task-name{text-decoration:line-through;}
.task-check{
  width:24px;height:24px;flex-shrink:0;border-radius:8px;
  border:2px solid currentColor;
  display:grid;place-items:center;transition:background 0.15s;
}
.task-item.done .task-check{background:currentColor;}
.task-check svg{display:none;width:12px;height:12px;}
.task-item.done .task-check svg{display:block;}
.task-info{flex:1;min-width:0;}
.task-name{font-size:15px;font-weight:500;line-height:1.3;}
.task-time{font-size:11px;color:var(--muted2);margin-top:2px;font-weight:400;}
.task-cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:currentColor;}

/* Hoy habits */
.habits-today{padding:0 16px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:28px;}
.hab-btn{
  background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);
  padding:16px 14px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all 0.18s;user-select:none;-webkit-user-select:none;
}
.hab-btn:active{transform:scale(0.97);}
.hab-btn.done{border-width:2px;}
.hab-icon{font-size:26px;flex-shrink:0;}
.hab-info{flex:1;min-width:0;}
.hab-name{font-size:13px;font-weight:600;line-height:1.2;margin-bottom:3px;}
.hab-status{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}

/* ════════════════════════════════
   SEMANA SCREEN
════════════════════════════════ */
.week-top{padding:56px 20px 20px;}
.week-title{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:2px;margin-bottom:4px;}
.week-title span{color:var(--box);}
.week-subtitle{font-size:12px;color:var(--muted2);}

/* Week overall progress */
.week-prog-card{margin:0 16px 20px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.wpc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.wpc-label{font-size:13px;font-weight:600;}
.wpc-pct{font-size:24px;font-weight:800;color:var(--gym);}
.wpc-track{height:8px;background:rgba(255,255,255,0.06);border-radius:8px;overflow:hidden;}
.wpc-fill{height:100%;background:linear-gradient(90deg,var(--box),var(--gym));border-radius:8px;transition:width 0.5s ease;}

/* Day pills row */
.day-pills{display:flex;gap:6px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none;}
.day-pills::-webkit-scrollbar{display:none;}
.day-pill{
  flex-shrink:0;background:var(--s2);border:1.5px solid var(--border);
  border-radius:40px;padding:8px 14px;cursor:pointer;transition:all 0.15s;
  display:flex;flex-direction:column;align-items:center;gap:3px;min-width:52px;
}
.day-pill.active{background:var(--box);border-color:var(--box);}
.day-pill.is-today{border-color:var(--box);}
.day-pill.is-past{opacity:0.5;}
.dp-name{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);}
.day-pill.active .dp-name{color:rgba(255,255,255,0.8);}
.dp-num{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;}
.day-pill.is-today .dp-num{color:var(--box);}
.day-pill.active .dp-num{color:#fff;}
.dp-bar{width:28px;height:3px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.dp-bar-fill{height:100%;background:rgba(255,255,255,0.5);border-radius:3px;transition:width 0.3s;}
.day-pill.active .dp-bar{background:rgba(255,255,255,0.2);}

/* Selected day tasks */
.day-detail{padding:0 16px;margin-bottom:24px;}
.dd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.dd-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;}
.dd-pct{font-size:13px;font-weight:700;color:var(--gym);}
.dd-tasks{display:flex;flex-direction:column;gap:5px;}
.dd-task{
  display:flex;align-items:center;gap:12px;
  background:var(--s2);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;cursor:pointer;transition:all 0.15s;user-select:none;
}
.dd-task:active{transform:scale(0.98);}
.dd-task.done{opacity:0.3;}
.dd-task.done .dd-task-name{text-decoration:line-through;}
.dd-check{width:20px;height:20px;flex-shrink:0;border-radius:6px;border:2px solid currentColor;display:grid;place-items:center;transition:background 0.15s;}
.dd-task.done .dd-check{background:currentColor;}
.dd-check svg{display:none;width:10px;height:10px;}
.dd-task.done .dd-check svg{display:block;}
.dd-task-info{flex:1;}
.dd-task-name{font-size:13px;font-weight:500;}
.dd-task-time{font-size:11px;color:var(--muted2);margin-top:1px;}

/* ════════════════════════════════
   RESUMEN SCREEN
════════════════════════════════ */
.res-top{padding:56px 20px 20px;}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:2px;margin-bottom:4px;}
.res-title span{color:var(--box);}
.res-subtitle{font-size:12px;color:var(--muted2);}

/* Habit grid full */
.res-habits{padding:0 16px;display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.res-hab-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.rhc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.rhc-icon{font-size:26px;}
.rhc-info{flex:1;}
.rhc-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.rhc-sub{font-size:11px;color:var(--muted2);}
.rhc-pct{font-size:22px;font-weight:800;}
.rhc-dots{display:flex;gap:5px;margin-bottom:8px;}
.rhc-dot{
  flex:1;height:32px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:transparent;
  cursor:pointer;transition:all 0.15s;
}
.rhc-dot.on{color:#000;}
.rhc-dot.off-day{opacity:0.15;cursor:default;pointer-events:none;}
.rhc-dot.today-dot{box-shadow:0 0 0 2px rgba(255,255,255,0.25);}
.rhc-bar-wrap{height:5px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden;}
.rhc-bar-fill{height:100%;border-radius:5px;transition:width 0.5s ease;}

/* Area summary cards */
.res-areas{padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:28px;}
.area-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.area-icon{font-size:22px;margin-bottom:6px;}
.area-name{font-size:11px;font-weight:700;margin-bottom:2px;}
.area-sub{font-size:10px;color:var(--muted2);margin-bottom:8px;}
.area-bar-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-bottom:4px;}
.area-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.area-pct{font-size:18px;font-weight:800;}

/* Reset */
.reset-row{padding:0 16px 8px;text-align:center;}
.reset-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted2);
  font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;
  padding:10px 24px;border-radius:40px;cursor:pointer;transition:all 0.15s;}
.reset-btn:hover{border-color:var(--box);color:var(--box);}

/* ── COLOR HELPERS ── */
.c-box{color:var(--box);} .c-gym{color:var(--gym);} .c-class{color:var(--class);}
.c-food{color:var(--food);} .c-sleep{color:var(--sleep);} .c-prep{color:var(--prep);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>

<div class="ambient">
  <div class="ambient-blob ab1"></div>
  <div class="ambient-blob ab2"></div>
  <div class="ambient-blob ab3"></div>
</div>

<!-- ══ HOY ══════════════════════════════════════════ -->
<div class="screen active" id="sc-hoy">

  <div class="hoy-top">
    <div>
      <div class="hoy-greeting">Tu día de hoy</div>
      <div class="hoy-day" id="hoy-day">...</div>
      <div class="hoy-sub" id="hoy-sub">...</div>
    </div>
    <div class="ring-wrap">
      <svg viewBox="0 0 76 76">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff3d00"/>
            <stop offset="100%" stop-color="#ff6d3a"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="38" cy="38" r="33"/>
        <circle class="ring-fill" id="ring-fill" cx="38" cy="38" r="33"/>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-lbl">hoy</div>
      </div>
    </div>
  </div>

  <div class="hoy-strip">
    <div class="hoy-strip-row">
      <span class="hoy-strip-label">Tareas completadas</span>
      <span class="hoy-strip-count" id="strip-count">0/0</span>
    </div>
    <div class="strip-track"><div class="strip-fill" id="strip-fill" style="width:0%"></div></div>
  </div>

  <div class="sec-label">Horario de hoy</div>
  <div class="task-list" id="hoy-tasks"></div>

  <div class="sec-label">Hábitos de hoy</div>
  <div class="habits-today" id="hoy-habits"></div>

</div>

<!-- ══ SEMANA ════════════════════════════════════════ -->
<div class="screen" id="sc-semana">

  <div class="week-top">
    <div class="week-title">ESTA <span>SEMANA</span></div>
    <div class="week-subtitle" id="week-range">...</div>
  </div>

  <div class="week-prog-card">
    <div class="wpc-row">
      <span class="wpc-label">Progreso semanal</span>
      <span class="wpc-pct" id="wpc-pct">0%</span>
    </div>
    <div class="wpc-track"><div class="wpc-fill" id="wpc-fill" style="width:0%"></div></div>
  </div>

  <div class="day-pills" id="day-pills"></div>

  <div class="day-detail">
    <div class="dd-header">
      <div class="dd-title" id="dd-title">Lunes</div>
      <div class="dd-pct" id="dd-pct">0%</div>
    </div>
    <div class="dd-tasks" id="dd-tasks"></div>
  </div>

</div>

<!-- ══ RESUMEN ═══════════════════════════════════════ -->
<div class="screen" id="sc-resumen">

  <div class="res-top">
    <div class="res-title">RESUMEN <span>SEMANAL</span></div>
    <div class="res-subtitle">Tus hábitos esta semana</div>
  </div>

  <div class="sec-label">Hábitos</div>
  <div class="res-habits" id="res-habits"></div>

  <div class="sec-label">Por área</div>
  <div class="res-areas" id="res-areas"></div>

  <div class="reset-row">
    <button class="reset-btn" onclick="resetAll()">🗑️ Resetear semana</button>
  </div>

</div>

<!-- ══ NAV ═══════════════════════════════════════════ -->
<nav class="nav">
  <button class="nav-btn active" id="nb-hoy" onclick="goTo('hoy')">
    <div class="nav-icon">☀️</div>
    <div class="nav-label">Hoy</div>
    <div class="nav-pip"></div>
  </button>
  <button class="nav-btn" id="nb-semana" onclick="goTo('semana')">
    <div class="nav-icon">📅</div>
    <div class="nav-label">Semana</div>
    <div class="nav-pip"></div>
  </button>
  <button class="nav-btn" id="nb-resumen" onclick="goTo('resumen')">
    <div class="nav-icon">📊</div>
    <div class="nav-label">Resumen</div>
    <div class="nav-pip"></div>
  </button>
</nav>

<script>
// ── DATES ─────────────────────────────────────────────────────────
function getMonday(d){
  const day=d.getDay(),diff=day===0?-6:1-day,m=new Date(d);
  m.setDate(d.getDate()+diff);return m;
}
const TODAY=new Date();
const MON=getMonday(TODAY);
const MONTH=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DAYNAMES=['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
const DAYFULL=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const NOTES=['¡Semana nueva, a romperla!','¡Segundo día, mantén el fuego!',
  '¡Mitad de semana, no pares!','¡Ya casi viernes, dale todo!',
  '¡Último día de boxeo, cierra fuerte!','¡Sábado de gym, a terminar bien!',
  '¡Recarga total, te lo ganaste!'];

const DAYS=DAYNAMES.map((n,i)=>{
  const d=new Date(MON);d.setDate(MON.getDate()+i);
  return{name:n,num:d.getDate(),month:d.getMonth(),full:d};
});
const TI=DAYS.findIndex(d=>d.full.toDateString()===TODAY.toDateString());

// Week range label
const we=DAYS[6];
document.getElementById('week-range').textContent=
  `${DAYS[0].num} — ${we.num} de ${MONTH[we.month]} · ${TODAY.getFullYear()}`;

// ── SCHEDULE ──────────────────────────────────────────────────────
const WD=[
  {l:'Despertar + 500ml agua',    t:'4:15 AM',          c:'c-sleep', h:2},
  {l:'Snack ligero',              t:'4:15–4:25 AM',     c:'c-food'},
  {l:'Salida a boxeo',            t:'4:30 AM',          c:'c-box'},
  {l:'Boxeo',                     t:'5:00–6:00 AM',     c:'c-box',   h:0},
  {l:'Regreso + desayuno',        t:'6:00–6:45 AM',     c:'c-food'},
  {l:'Clases',                    t:'7:00–12:00 PM',    c:'c-class', h:3},
  {l:'Traslado a casa',           t:'12:00–1:00 PM',    c:'c-sleep'},
  {l:'Cocinar y almorzar',        t:'1:00–2:00 PM',     c:'c-food',  h:4},
  {l:'Gym (pesas)',               t:'2:15–4:30 PM',     c:'c-gym',   h:1},
  {l:'Cocinar cena + mañana',     t:'4:30–5:10 PM',     c:'c-food'},
  {l:'Estudio / repaso',          t:'5:10–7:00 PM',     c:'c-prep',  h:6},
  {l:'Sin pantallas',             t:'7:30 PM',          c:'c-prep'},
  {l:'Dormir',                    t:'8:00 PM',          c:'c-sleep', h:5},
];
const FR=[
  {l:'Despertar + 500ml agua',    t:'4:15 AM',          c:'c-sleep', h:2},
  {l:'Snack ligero',              t:'4:15–4:25 AM',     c:'c-food'},
  {l:'Salida a boxeo',            t:'4:30 AM',          c:'c-box'},
  {l:'Boxeo',                     t:'5:00–6:00 AM',     c:'c-box',   h:0},
  {l:'Regreso + desayuno',        t:'6:00–6:45 AM',     c:'c-food'},
  {l:'Clases',                    t:'7:00–12:00 PM',    c:'c-class', h:3},
  {l:'Traslado a casa',           t:'12:00–1:00 PM',    c:'c-sleep'},
  {l:'Cocinar y almorzar',        t:'1:00–2:00 PM',     c:'c-food',  h:4},
  {l:'Gym (pesas)',               t:'2:15–4:30 PM',     c:'c-gym',   h:1},
  {l:'Cocinar cena + mañana',     t:'4:30–5:10 PM',     c:'c-food'},
  {l:'Tiempo libre',              t:'5:10–7:00 PM',     c:'c-sleep'},
  {l:'Sin pantallas',             t:'7:30 PM',          c:'c-prep'},
  {l:'Dormir',                    t:'8:00 PM',          c:'c-sleep', h:5},
];
const SA=[
  {l:'Despertar + agua',          t:'5:45 AM',          c:'c-sleep', h:2},
  {l:'Desayuno ligero',           t:'6:00–6:20 AM',     c:'c-food'},
  {l:'Clases',                    t:'6:30–9:30 AM',     c:'c-class', h:3},
  {l:'Traslado a casa',           t:'9:30–10:30 AM',    c:'c-sleep'},
  {l:'Gym (pesas)',               t:'11:00 AM–1:15 PM', c:'c-gym',   h:1},
  {l:'Cocinar y almorzar',        t:'1:15–2:15 PM',     c:'c-food',  h:4},
  {l:'Descanso / siesta',         t:'2:15–4:00 PM',     c:'c-sleep'},
  {l:'Tiempo libre',              t:'4:00–7:00 PM',     c:'c-sleep'},
  {l:'Prep semana siguiente',     t:'7:00–7:20 PM',     c:'c-prep'},
  {l:'Dormir',                    t:'8:00 PM',          c:'c-sleep', h:5},
];
const SU=[
  {l:'Despertar tranquilo',       t:'6:30–7:00 AM',     c:'c-sleep'},
  {l:'Desayuno especial',         t:'7:30 AM',          c:'c-food',  h:4},
  {l:'Caminata / recuperación',   t:'9:00–9:30 AM',     c:'c-gym'},
  {l:'Tiempo libre',              t:'10:00 AM–3:00 PM', c:'c-sleep'},
  {l:'Meal prep semana',          t:'3:00–4:00 PM',     c:'c-food'},
  {l:'Organizar semana',          t:'4:00–5:30 PM',     c:'c-prep'},
  {l:'Sin pantallas',             t:'7:30 PM',          c:'c-prep'},
  {l:'Dormir',                    t:'8:00 PM',          c:'c-sleep', h:5},
];
const SCH=[WD,WD,WD,WD,FR,SA,SU];

const HABITS=[
  {icon:'🥊',name:'Boxeo 5am',    color:'#ff3d00',days:[0,1,2,3,4]},
  {icon:'🏋️',name:'Gym',         color:'#00e5ff',days:[0,1,2,3,4,5]},
  {icon:'💧',name:'Agua',         color:'#4dd0e1',days:[0,1,2,3,4,5,6]},
  {icon:'🎓',name:'Clases',       color:'#ffd600',days:[0,1,2,3,4,5]},
  {icon:'🍳',name:'Cocinar',      color:'#4ade80',days:[0,1,2,3,4,5,6]},
  {icon:'😴',name:'Dormir 8pm',   color:'#a78bfa',days:[0,1,2,3,4,5,6]},
  {icon:'📚',name:'Estudiar',     color:'#f472b6',days:[0,1,2,3,4]},
];

// ── STORAGE ───────────────────────────────────────────────────────
const WK=`planner-${MON.toISOString().slice(0,10)}`;
function load(){try{const r=localStorage.getItem(WK);return r?JSON.parse(r):{t:{},h:{}};}catch{return{t:{},h:{}};}}
function save(){try{localStorage.setItem(WK,JSON.stringify({t:TS,h:HS}));}catch{}}
let {t:TS,h:HS}=load();
const K=(a,b)=>`${a}-${b}`;

// ── SYNC TASK→HABIT ────────────────────────────────────────────────
function sync(di,ti,val){
  const item=SCH[di][ti];
  if(item.h===undefined)return;
  if(!HABITS[item.h].days.includes(di))return;
  HS[K(item.h,di)]=val;
}

// ── NAVIGATION ────────────────────────────────────────────────────
let selectedDay=TI>=0?TI:0;
function goTo(sc){
  ['hoy','semana','resumen'].forEach(s=>{
    document.getElementById('sc-'+s).classList.toggle('active',s===sc);
    document.getElementById('nb-'+s).classList.toggle('active',s===sc);
  });
  if(sc==='semana') buildWeek();
  if(sc==='resumen') buildResumen();
}

// ── HOY ───────────────────────────────────────────────────────────
function buildHoy(){
  if(TI<0){
    document.getElementById('hoy-day').textContent='Fuera de semana';
    document.getElementById('hoy-sub').textContent='Abre el lunes para ver tu plan.';
    return;
  }
  const di=TI;
  // header
  document.getElementById('hoy-day').innerHTML=`<em>${DAYFULL[di]}</em> ${DAYS[di].num}`;
  document.getElementById('hoy-sub').textContent=NOTES[di];

  // tasks
  const tasks=SCH[di];
  const done=tasks.filter((_,ti)=>TS[K(di,ti)]).length;
  const pct=tasks.length?Math.round((done/tasks.length)*100):0;
  // ring
  const circ=2*Math.PI*33;
  document.getElementById('ring-fill').style.strokeDashoffset=circ-(circ*pct/100);
  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('strip-count').textContent=`${done}/${tasks.length}`;
  document.getElementById('strip-fill').style.width=pct+'%';

  // task list
  const tl=document.getElementById('hoy-tasks');
  tl.innerHTML='';
  tasks.forEach((item,ti)=>{
    const isDone=TS[K(di,ti)]||false;
    const el=document.createElement('div');
    el.className=`task-item ${isDone?'done':''}`;
    el.innerHTML=`
      <div class="task-check ${item.c}">
        <svg viewBox="0 0 12 10" fill="none">
          <path d="M1 5L4 8.5L11 1" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-info">
        <div class="task-name">${item.l}</div>
        <div class="task-time">${item.t}</div>
      </div>
      <div class="task-cat-dot ${item.c}"></div>`;
    el.addEventListener('click',()=>{
      const v=!TS[K(di,ti)];TS[K(di,ti)]=v;
      sync(di,ti,v);save();buildHoy();buildWeekPills();buildResumen();
    });
    tl.appendChild(el);
  });

  // habits today
  const hl=document.getElementById('hoy-habits');
  hl.innerHTML='';
  HABITS.forEach((h,hi)=>{
    if(!h.days.includes(di))return;
    const on=HS[K(hi,di)]||false;
    const btn=document.createElement('div');
    btn.className=`hab-btn ${on?'done':''}`;
    btn.style.borderColor=on?h.color:'';
    btn.style.background=on?`${h.color}15`:'';
    btn.innerHTML=`
      <div class="hab-icon">${h.icon}</div>
      <div class="hab-info">
        <div class="hab-name" style="color:${on?h.color:''}">${h.name}</div>
        <div class="hab-status" style="color:${on?h.color:'var(--muted)'}">${on?'✓ Listo':'Pendiente'}</div>
      </div>`;
    btn.addEventListener('click',()=>{
      HS[K(hi,di)]=!HS[K(hi,di)];save();buildHoy();buildResumen();
    });
    hl.appendChild(btn);
  });
}

// ── WEEK ──────────────────────────────────────────────────────────
function buildWeekPills(){
  const pills=document.getElementById('day-pills');
  if(!pills)return;
  pills.innerHTML='';
  DAYS.forEach((d,di)=>{
    const tasks=SCH[di];
    const done=tasks.filter((_,ti)=>TS[K(di,ti)]).length;
    const pct=tasks.length?Math.round((done/tasks.length)*100):0;
    const isToday=di===TI,isPast=TI>=0&&di<TI,isSel=di===selectedDay;
    const pill=document.createElement('div');
    pill.className=`day-pill ${isSel?'active':''} ${isToday&&!isSel?'is-today':''} ${isPast?'is-past':''}`;
    pill.innerHTML=`
      <div class="dp-name">${d.name}</div>
      <div class="dp-num">${d.num}</div>
      <div class="dp-bar"><div class="dp-bar-fill" style="width:${pct}%"></div></div>`;
    pill.addEventListener('click',()=>{selectedDay=di;buildWeek();});
    pills.appendChild(pill);
  });
}

function buildWeek(){
  // overall progress
  let tot=0,don=0;
  SCH.forEach((tasks,di)=>tasks.forEach((_,ti)=>{tot++;if(TS[K(di,ti)])don++;}));
  const wp=tot?Math.round((don/tot)*100):0;
  const wf=document.getElementById('wpc-fill'),wp2=document.getElementById('wpc-pct');
  if(wf)wf.style.width=wp+'%';if(wp2)wp2.textContent=wp+'%';

  buildWeekPills();

  // selected day detail
  const di=selectedDay;
  const tasks=SCH[di];
  const done=tasks.filter((_,ti)=>TS[K(di,ti)]).length;
  const pct=tasks.length?Math.round((done/tasks.length)*100):0;
  const dt=document.getElementById('dd-title'),dp=document.getElementById('dd-pct');
  if(dt)dt.textContent=`${DAYFULL[di]} ${DAYS[di].num}`;
  if(dp)dp.textContent=pct+'%';
  const dl=document.getElementById('dd-tasks');
  if(!dl)return;
  dl.innerHTML='';
  tasks.forEach((item,ti)=>{
    const isDone=TS[K(di,ti)]||false;
    const el=document.createElement('div');
    el.className=`dd-task ${isDone?'done':''}`;
    el.innerHTML=`
      <div class="dd-check ${item.c}">
        <svg viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="dd-task-info">
        <div class="dd-task-name">${item.l}</div>
        <div class="dd-task-time">${item.t}</div>
      </div>`;
    el.addEventListener('click',()=>{
      const v=!TS[K(di,ti)];TS[K(di,ti)]=v;
      sync(di,ti,v);save();buildWeek();
      if(di===TI)buildHoy();
    });
    dl.appendChild(el);
  });
}

// ── RESUMEN ───────────────────────────────────────────────────────
function buildResumen(){
  // habits
  const rh=document.getElementById('res-habits');
  if(!rh)return;
  rh.innerHTML='';
  HABITS.forEach((h,hi)=>{
    const count=h.days.filter(di=>HS[K(hi,di)]).length;
    const pct=h.days.length?Math.round((count/h.days.length)*100):0;
    const card=document.createElement('div');
    card.className='res-hab-card';
    const dots=DAYS.map((d,di)=>{
      const active=h.days.includes(di),on=HS[K(hi,di)]||false,isToday=di===TI;
      return `<div class="rhc-dot ${on?'on':''} ${!active?'off-day':''} ${isToday&&active?'today-dot':''}"
        style="${on?`background:${h.color};border-color:${h.color}`:''}"
        data-hi="${hi}" data-di="${di}">${on?'✓':d.name}</div>`;
    }).join('');
    card.innerHTML=`
      <div class="rhc-top">
        <div class="rhc-icon">${h.icon}</div>
        <div class="rhc-info"><div class="rhc-name">${h.name}</div><div class="rhc-sub">${count}/${h.days.length} días</div></div>
        <div class="rhc-pct" style="color:${h.color}">${pct}%</div>
      </div>
      <div class="rhc-dots">${dots}</div>
      <div class="rhc-bar-wrap"><div class="rhc-bar-fill" style="width:${pct}%;background:${h.color}"></div></div>`;
    card.querySelectorAll('.rhc-dot:not(.off-day)').forEach(dot=>{
      dot.addEventListener('click',()=>{
        const hi2=+dot.dataset.hi,di2=+dot.dataset.di;
        HS[K(hi2,di2)]=!HS[K(hi2,di2)];save();buildResumen();
        if(di2===TI)buildHoy();
      });
    });
    rh.appendChild(card);
  });

  // areas
  const ra=document.getElementById('res-areas');
  if(!ra)return;
  ra.innerHTML='';
  const areas=[
    {icon:'🥊',name:'Entrenamiento',sub:'Boxeo + Gym',color:'#ff3d00',
      calc:()=>({d:[0,1,2,3,4].filter(di=>HS[K(0,di)]).length+[0,1,2,3,4,5].filter(di=>HS[K(1,di)]).length,t:11})},
    {icon:'💧',name:'Hidratación',sub:'Agua al despertar',color:'#4dd0e1',
      calc:()=>({d:[0,1,2,3,4,5,6].filter(di=>HS[K(2,di)]).length,t:7})},
    {icon:'🎓',name:'Clases',sub:'Días atento',color:'#ffd600',
      calc:()=>({d:[0,1,2,3,4,5].filter(di=>HS[K(3,di)]).length,t:6})},
    {icon:'🍳',name:'Alimentación',sub:'Cocinar en casa',color:'#4ade80',
      calc:()=>({d:[0,1,2,3,4,5,6].filter(di=>HS[K(4,di)]).length,t:7})},
    {icon:'😴',name:'Sueño',sub:'Dormir a las 8pm',color:'#a78bfa',
      calc:()=>({d:[0,1,2,3,4,5,6].filter(di=>HS[K(5,di)]).length,t:7})},
    {icon:'📚',name:'Estudio',sub:'Repasos tarde',color:'#f472b6',
      calc:()=>({d:[0,1,2,3,4].filter(di=>HS[K(6,di)]).length,t:5})},
  ];
  areas.forEach(a=>{
    const {d,t}=a.calc();
    const pct=t?Math.round((d/t)*100):0;
    const card=document.createElement('div');
    card.className='area-card';
    card.innerHTML=`
      <div class="area-icon">${a.icon}</div>
      <div class="area-name">${a.name}</div>
      <div class="area-sub">${a.sub}</div>
      <div class="area-bar-wrap"><div class="area-bar-fill" style="width:${pct}%;background:${a.color}"></div></div>
      <div class="area-pct" style="color:${a.color}">${pct}%</div>`;
    ra.appendChild(card);
  });
}

// ── RESET ─────────────────────────────────────────────────────────
function resetAll(){
  if(!confirm('¿Resetear toda la semana?'))return;
  TS={};HS={};save();buildHoy();buildWeekPills();buildResumen();
}

// ── INIT ──────────────────────────────────────────────────────────
buildHoy();
</script>
</body>
</html>
